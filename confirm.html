<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Chiki Pizza - Basket</title>
</head>
<body>
    <div class="cart-container">
        <!-- Header Section -->
         <div class="header-top">
        <div class="header-left">
            <img src="logo.png" alt="Chiki Logo" class="mini-logo">
            <h1 class="brand-text">Chiki pizza</h1>
        </div>
        <div class="header-right">
            <div class="user-avatar">
                <img src="icon2.png" alt="User">
            </div>
        </div>
    </div>

        <h2 class="section-title">Ваші позиції</h2>

        <!-- Items List -->
        <div class="items-list">
            <div class="item-card">
                <button class="remove-btn">✕</button>
                <div class="item-icon">
                    <img src="icon4.png">
                </div>
                <div class="item-info">
                    <span class="item-name">"Назва"</span>
                </div>
                <div class="quantity-control">
                    <span class="qty-label">к-сть</span>
                    <div class="counter">
                        <button class="minus">-</button>
                        <span class="count">...</span>
                        <button class="plus">+</button>
                    </div>
                </div>
            </div>

            <div class="item-card">
                <button class="remove-btn">✕</button>
                <div class="item-icon">
                    <img src="icon4.png">
                </div>
                <div class="item-info">
                    <span class="item-name">"Назва"</span>
                </div>
                <div class="quantity-control">
                    <span class="qty-label">к-сть</span>
                    <div class="counter">
                        <button class="minus">-</button>
                        <span class="count">...</span>
                        <button class="plus">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
       <footer class="cart-footer">
    <a href="delivery.html" class="btn btn-cancel" style="text-decoration: none; text-align: center;">СКАСУВАТИ</a>
    
    <a href="order.html" class="btn btn-confirm" style="text-decoration: none; text-align: center;">ПІДТВЕРДИТИ</a>
</footer>
    </div>
</body>
</html>
